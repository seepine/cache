name: Check

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: npm install

      - name: Tsc
        run: npm run tsc

      - name: Format
        run: npm run format

      - name: Test
        run: npm run test

      - name: Test Bun Adapter
        run: bun test src/adapt/bun.test.ts

      - name: Coverage
        run: npm run coverage

      - name: Build
        run: npm run build
